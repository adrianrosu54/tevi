name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false # don't cancel other platforms if one fails
      matrix:
        include:
          - os: ubuntu-22.04
            preset: release-linux
            asset_name: tevi-linux-x86_64

          - os: windows-latest
            preset: release-windows
            asset_name: tevi-windows-x86_64

          - os: macos-14
            preset: release-macos
            asset_name: tevi-macos-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # save vcpkg installed dependencies
      - name: cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-

      # Install ninja
      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      # Install LLVM on Linux
      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld libv4l-dev

      # clang-cl MSVC headers and libraries configuration
      - name: Set up MSVC environment on Windows
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Clone vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git

      # Bootstrap vcpkg
      - name: Bootstrap vcpkg
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./vcpkg/bootstrap-vcpkg.bat
          else
            ./vcpkg/bootstrap-vcpkg.sh
          fi

      - name: Set VCPKG_ROOT
        shell: bash
        run: echo "VCPKG_ROOT=$GITHUB_WORKSPACE/vcpkg" >> $GITHUB_ENV 

      - name: Configure
        shell: bash
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build build

      # strip debug symbols on Linux and Mac
      - name: Strip binary
        if: runner.os != 'Windows'
        run: strip build/tevi

      - name: Package Unix binary
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.asset_name }}.tar.gz -C build tevi

      - name: Package Windows binary
        if: runner.os == 'Windows'
        run: |
          powershell Compress-Archive build/tevi.exe ${{ matrix.asset_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            *.tar.gz
            *.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tevi-linux-x86_64/tevi-linux-x86_64.tar.gz
            tevi-windows-x86_64/tevi-windows-x86_64.zip
            tevi-macos-arm64/tevi-macos-arm64.tar.gz

