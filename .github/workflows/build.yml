name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false # don't cancel other platforms if one fails
      matrix:
        include:
          - os: ubuntu-22.04
            preset: release-linux
            binary: tevi
            artifact: tevi-linux

          - os: windows-latest
            preset: release-windows
            binary: tevi.exe
            artifact: tevi-windows

          - os: macos-14
            preset: release-macos
            binary: tevi
            artifact: tevi-macos
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # save vcpkg installed dependencies
      - name: cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg.json') }}

      # video headers for linux
      - name: install Linux video dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libv4l-dev

      - name: Set up Ninja 
        uses: ninja-build/install-action@v1

      # clang-cl MSVC headers and libraries configuration
      - name: Set up MSVC environment on Windows
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        env:
          VCPKG_ROOT: ${{ env.VCPKG_INSTALLATION_ROOT }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build build

      # strip debug symbols on Linux and Mac
      - name: Strip binary
        if: runner.os != 'Windows'
        run: strip build/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/${{ matrix.binary }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub release
        uses: softprops/actions-gh-release@v2
        with:
          files: |
            tevi-linux/tevi
            tevi-windows/tevi.exe
            tevi-macos/tevi

